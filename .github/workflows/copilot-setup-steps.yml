name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Fetch all branch refs for Copilot diffing
        run: git fetch --prune origin +refs/heads/*:refs/remotes/origin/*

      - name: Ensure default branch is locally resolvable
        shell: bash
        run: |
          DEFAULT_BRANCH="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
          if [ -n "$DEFAULT_BRANCH" ]; then
            git branch --force "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          fi

      - name: Install uv
        run: python -m pip install --user uv

      - name: Pre-install project dependencies
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv pip install -e ".[dev]"
