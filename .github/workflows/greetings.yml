name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Welcome to the EpiNext community! 👋 Thank you for opening your first issue. \n\nPlease ensure you have provided enough context, steps to reproduce (if it's a bug), or a clear feature description. Our maintainers will review this as soon as possible."
        pr-message: "Thank you for your first pull request to EpiNext! 🚀 We truly appreciate you taking the time to contribute to the project.\n\nOur team will review your code shortly. While you wait, please double-check that your PR includes tests for any new functionality and that your code passes our linting checks. Feel free to leave a comment if you have any questions about the review process!"