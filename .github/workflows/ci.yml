name: Python CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    # Required permissions for the coverage comment action to post on PRs
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # Adjust to your project's version if needed

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # If you have a requirements file:
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # If you use pyproject.toml or setup.py, uncomment the line below to install your package:
          # pip install -e .

      # Tell Ruff to target the src directory
      - name: ruff-action
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "check src/"

      # Set PYTHONPATH to src so pytest can find EpiNext, and set coverage to target it
      - name: Run Pytest with Coverage
        run: |
          PYTHONPATH=src pytest --cov=EpiNext --cov-report=term-missing > pytest-coverage.txt

      - name: Pytest Coverage Comment
        uses: MishaKav/pytest-coverage-comment@v1.7.2
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          title: "EpiNext Coverage Report"
